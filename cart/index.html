<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart - Rice Spice Hub</title>

<link rel="stylesheet" href="../css/style.css">

<style>
/* Basic safe styling (you can move to style.css later) */
.cart-item{
  display:flex;
  gap:15px;
  padding:15px;
  border-bottom:1px solid #ddd;
  align-items:center;
}

.cart-item img{
  width:80px;
  height:80px;
  object-fit:cover;
}

.cart-details{
  flex:1;
}

.qty-controls button{
  padding:5px 10px;
  margin:0 5px;
  cursor:pointer;
}

.remove-btn{
  margin-top:10px;
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

.cart-summary{
  margin-top:20px;
  padding:15px;
  border-top:2px solid #000;
}

.empty-cart{
  text-align:center;
  padding:20px;
  font-size:18px;
}
</style>

</head>

<body>

<section class="categories">
  <h2>🛒 Shopping Cart</h2>
  <p class="section-subtitle">Review your items before checkout</p>
</section>

<section>

<div id="cart-items"></div>

<div class="cart-summary">

  <h3>
    Subtotal: ¥<span id="cart-total">0</span>
  </h3>

  <p>✓ Tax Included</p>
  <p>🚚 FREE Delivery on Orders Over ¥6,000</p>
  <p>🔒 Secure Ordering Process</p>

  <br>

  <a href="../index.html" class="btn">Continue Shopping</a>
  <a href="../checkout/index.html" class="btn">Proceed To Checkout</a>

</div>

</section>

<script>
document.addEventListener("DOMContentLoaded", displayCart);

function displayCart(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let container = document.getElementById("cart-items");
  let total = 0;

  container.innerHTML = "";

  if(cart.length === 0){
    container.innerHTML = `
      <p class="empty-cart">Your cart is empty 🛒</p>
    `;
    document.getElementById("cart-total").textContent = 0;
    return;
  }

  cart.forEach(item => {

    total += item.price * item.quantity;

    container.innerHTML += `
      <div class="cart-item">

        <img src="${item.image}" alt="${item.name}">

        <div class="cart-details">

          <h3>${item.name}</h3>
          <p>Code: ${item.id}</p>
          <p>Unit Price: ¥${item.price.toLocaleString()}</p>

          <div class="qty-controls">
            <button onclick="decreaseQty('${item.id}')">−</button>
            <span>${item.quantity}</span>
            <button onclick="increaseQty('${item.id}')">+</button>
          </div>

          <p>
            Line Total: ¥${(item.price * item.quantity).toLocaleString()}
          </p>

          <button class="remove-btn" onclick="removeItem('${item.id}')">
            Remove
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("cart-total").textContent = total.toLocaleString();
}


/* OPTIONAL (only if not already in cart.js) */
function increaseQty(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i => i.id === id);

  if(item){
    item.quantity++;
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
  }
}

function decreaseQty(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i => i.id === id);

  if(item && item.quantity > 1){
    item.quantity--;
  } else {
    cart = cart.filter(i => i.id !== id);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

function removeItem(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(i => i.id !== id);

  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

</script>

</body>
</html>
