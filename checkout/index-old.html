<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Rice Spice Hub</title>

<link rel="stylesheet" href="../css/style.css">

<style>

.checkout-container{
max-width:900px;
margin:auto;
padding:30px;
}

.checkout-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.checkout-total{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.checkout-form{
margin-top:30px;
}

.checkout-form input,
.checkout-form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
box-sizing:border-box;
}

.checkout-btn{
background:#0a7f3f;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
cursor:pointer;
}

.checkout-btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="checkout-container">

<h1>Checkout</h1>

<h2>Your Order</h2>

<div id="orderSummary"></div>

<div class="checkout-total">
Total: ¥<span id="orderTotal">0</span>
</div>

<hr style="margin:30px 0;">

<h2>Customer Information</h2>

<div class="checkout-form">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="text"
id="phone"
placeholder="Phone Number"
required>

<input
type="email"
id="email"
placeholder="Email Address">

<textarea
id="address"
rows="4"
placeholder="Delivery Address"></textarea>

<button
class="checkout-btn"
onclick="submitOrder()">

Place Order

</button>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxL1aNFWUU7KBsdrH4cQMtLu_ORljcNSAqADIsH1mV_qLZZEtTyAkfWhvTdYaxqR4aMzQ/exec";

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

function renderCheckout(){

const summary =
document.getElementById("orderSummary");

summary.innerHTML = "";

total = 0;

if(cart.length === 0){

summary.innerHTML =
"<p>Your cart is empty.</p>";

return;

}

cart.forEach(item => {

const lineTotal =
item.price * item.quantity;

total += lineTotal;

summary.innerHTML += `

<div class="checkout-item">

<div>
<strong>${item.name}</strong>
<br>
${item.quantity} × ¥${item.price.toLocaleString()}
</div>

<div>
¥${lineTotal.toLocaleString()}
</div>

</div>

`;

});

document.getElementById("orderTotal")
.textContent =
total.toLocaleString();

}

function submitOrder(){

if(cart.length === 0){

alert("Cart is empty");

return;

}

const name =
document.getElementById("name").value.trim();

const phone =
document.getElementById("phone").value.trim();

const email =
document.getElementById("email").value.trim();

const address =
document.getElementById("address").value.trim();

if(!name){

alert("Please enter your name");

return;

}

if(!phone){

alert("Please enter your phone number");

return;

}

const order = {

orderNumber:
"RSH-" + Date.now(),

date:
new Date().toLocaleString(),

name,
phone,
email,
address,

total,

items:
JSON.stringify(cart)

};

fetch(API_URL, {

method: "POST",

body: JSON.stringify(order)

})
.then(response => response.text())
.then(data => {

localStorage.setItem(
"lastOrderNumber",
order.orderNumber
);

localStorage.removeItem("cart");

alert("Order submitted successfully!");

window.location.href =
"success.html";

})
.catch(error => {

console.error(error);

alert("Failed to submit order.");

});

}

renderCheckout();

</script>

</body>

</html>
