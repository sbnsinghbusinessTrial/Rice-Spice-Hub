<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart - Rice Spice Hub</title>

<link rel="stylesheet" href="../css/style.css">

<style>
/* Basic safe styling (you can move to style.css later) */
.cart-item{
  display:flex;
  gap:15px;
  padding:15px;
  border-bottom:1px solid #ddd;
  align-items:center;
}

.cart-item img{
  width:80px;
  height:80px;
  object-fit:cover;
}

.cart-details{
  flex:1;
}

.qty-controls button{
  padding:5px 10px;
  margin:0 5px;
  cursor:pointer;
}

.remove-btn{
  margin-top:10px;
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

.cart-summary{
  margin-top:20px;
  padding:15px;
  border-top:2px solid #000;
}

.empty-cart{
  text-align:center;
  padding:20px;
  font-size:18px;
}
</style>

</head>

<body>

<section class="categories">
  <h2>🛒 Shopping Cart</h2>
  <p class="section-subtitle">Review your items before checkout</p>
</section>

<section>

<div id="cart-items"></div>

<div class="cart-summary">

  <h3>
    Subtotal: ¥<span id="cart-total">0</span>
  </h3>

  <p>✓ Tax Included</p>
  <p>🚚 FREE Delivery on Orders Over ¥6,000</p>
  <p>🔒 Secure Ordering Process</p>

  <br>

  <a href="../index.html" class="btn">Continue Shopping</a>
  <a href="../checkout/index.html" class="btn">Proceed To Checkout</a>

</div>

</section>

<script src="../js/cart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){
    displayCart();
});
</script>

</body>
</html>
